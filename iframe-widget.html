<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wasserzeitung</title>
  <style>
    @font-face {
      font-family: 'Barlow';
      src: url('./fonts/barlow-400.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Barlow Semi Condensed';
      src: url('./fonts/barlow-semi-condensed-600.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Barlow", sans-serif;
      background: transparent;
      padding: 4px;
    }

    .gvm-card {
      display: flex;
      flex-direction: column;
      background-color: #fff;
      border-radius: 3px;
      box-shadow: 0 0 10px 0 rgba(0,0,0,.15);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: box-shadow .25s;
      width: 100%;
    }

    .gvm-card:hover {
      box-shadow: 0 0 20px 0 rgba(0,0,0,.25);
    }

    .gvm-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
    }

    .gvm-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gvm-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,.45);
      color: #fff;
      font-size: 11px;
      padding: 4px 8px;
    }

    .gvm-info {
      padding: 18px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .gvm-title {
      font-family: "Barlow Semi Condensed", sans-serif;
      font-size: 27px;
      font-weight: 600;
      line-height: 34px;
      letter-spacing: -0.9px;
      color: #009fe3;
    }

    .gvm-excerpt {
      font-family: "Barlow", sans-serif;
      font-size: 25px;
      font-weight: 400;
      letter-spacing: -0.9px;
      color: #333;
    }

    .gvm-read-more {
      font-family: "Barlow", sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #009fe3;
      text-decoration: none;
      margin-top: auto;
      padding-top: 8px;
      display: inline-block;
    }

    .gvm-error {
      font-family: "Barlow", sans-serif;
      font-size: 14px;
      color: #555;
      padding: 12px;
    }

    @media (max-width: 800px) {
      .gvm-title {
        font-size: 18px;
        line-height: 1.35;
        letter-spacing: -0.5px;
      }
      .gvm-excerpt {
        font-size: 14px;
        letter-spacing: 0;
      }
    }
  </style>
</head>
<body>
  <div id="card-container"></div>

  <script>
    function esc(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function safeUrl(str) {
      return typeof str === 'string' && str.indexOf('https://') === 0 ? str : '#';
    }

    fetch('./article.json')
      .then(function (res) { return res.json(); })
      .then(function (data) {
        document.getElementById('card-container').innerHTML =
          '<a class="gvm-card" href="' + safeUrl(data.url) + '" target="_blank" rel="noopener">' +
            '<div class="gvm-img-wrap">' +
              '<img src="' + safeUrl(data.image) + '" alt="' + esc(data.title) + '">' +
              '<span class="gvm-caption">' + esc(data.caption) + '</span>' +
            '</div>' +
            '<div class="gvm-info">' +
              '<p class="gvm-title">' + esc(data.title) + '</p>' +
              '<p class="gvm-excerpt">' + esc(data.excerpt) + '</p>' +
              '<span class="gvm-read-more">weiterlesen »</span>' +
            '</div>' +
          '</a>';
      })
      .catch(function () {
        document.getElementById('card-container').innerHTML =
          '<p class="gvm-error">Inhalt konnte nicht geladen werden.</p>';
      });
  </script>
</body>
</html>
